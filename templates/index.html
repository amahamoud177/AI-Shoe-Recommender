<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Sneaker | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
    <style>
        .hero-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 75vh;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-container img {
            max-width: 200px; /* Adjust this size as needed for your logo */
            height: auto;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .btn {
            background: var(--accent-gold, #D4AF37);
            color: var(--bg-deep, #050706);
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: opacity 0.3s ease, transform 0.2s ease;
            border: 1px solid var(--accent-gold, #D4AF37);
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: var(--accent-gold, #D4AF37);
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Logo Display -->
        <div class="logo-container">
            <img src="../static/logo.png" alt="Semantic Sneaker Logo">
        </div>

        <header style="padding: 0;">
            <h1>Semantic <span>Sneaker</span></h1>
            <p class="subtitle">The pinnacle of AI-driven fashion curation.</p>
        </header>

        <!-- Navigation Links -->
        <div class="action-buttons">
            <a href="login.html" class="btn">Client Login</a>
            <a href="signup.html" class="btn btn-outline">Request Access</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Portal | Semantic Sneaker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <a href="{{ url_for('index') }}" style="text-decoration: none;"><h1>Client <span>Portal</span></h1></a>
        <p class="subtitle">Access your personalized curation profile.</p>
    </header>
    
    <div class="glass-panel" style="width: 100%; max-width: 400px;">
        {% if error %}
            <p style="color: #ff4a4a; text-align: center; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}
        <form action="{{ url_for('login') }}" method="POST">
            <label style="color: var(--accent-gold);">Username</label>
            <input type="text" name="username" required>
            <label style="color: var(--accent-gold);">Password</label>
            <input type="password" name="password" required>
            <button type="submit" class="btn" style="width: 100%;">Authenticate</button>
        </form>
    </div>
</body>
</html>

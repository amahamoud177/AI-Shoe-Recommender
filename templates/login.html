<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Semantic Sneaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
    <style>
        .auth-container {
            display: flex; justify-content: center; align-items: center; min-height: 60vh; width: 100%;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--accent-gold, #D4AF37); font-size: 0.9rem; }
        .auth-link { display: block; margin-top: 20px; color: var(--text-muted, #8e9590); text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .auth-link:hover { color: var(--accent-gold, #D4AF37); }
        .home-link { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="home-link">
            <h1>Client <span>Portal</span></h1>
        </a>
        <p class="subtitle">Access your personalized curation profile.</p>
    </header>

    <div class="auth-container">
        <div class="glass-panel" style="text-align: center;">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required style="width: 100%;">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required style="width: 100%;">
                </div>
                <button type="submit" style="width: 100%; padding: 15px; margin-top: 10px;">Authenticate</button>
            </form>
            <a href="signup.html" class="auth-link">Request an invitation / Sign up</a>
        </div>
    </div>

</body>
</html>

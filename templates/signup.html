<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Semantic Sneaker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <a href="{{ url_for('home') }}" style="text-decoration: none;"><h1>Request <span>Access</span></h1></a>
        <p class="subtitle">Establish your semantic styling profile.</p>
    </header>
    
    <div class="glass-panel" style="width: 100%; max-width: 450px;">
        {% if error %}
            <p style="color: #ff4a4a; text-align: center; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}
        
        <form action="{{ url_for('signup') }}" method="POST">
            <label style="color: var(--accent-gold);">Full Name</label>
            <input type="text" name="name" placeholder="First and Last Name" required>
            
            <label style="color: var(--accent-gold);">Email Address</label>
            <input type="text" name="email" placeholder="you@example.com" required>
            
            <label style="color: var(--accent-gold);">Username</label>
            <input type="text" name="username" placeholder="Choose a unique username" required>
            
            <label style="color: var(--accent-gold);">Password</label>
            <input type="password" name="password" placeholder="Create a strong password" required>
            
            <label style="color: var(--accent-gold);">Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Re-enter your password" required>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Create Account</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('login') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Already have an account? Login here.</a>
        </div>
    </div>
</body>
</html>
